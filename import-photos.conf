# =============================================================================
# import-photos - Fichier de configuration
# =============================================================================
# Placez ce fichier dans ~/.import-photos.conf
# Toutes les valeurs peuvent etre surchargees par les options en ligne de commande.

# --- Source ---
# Chemin par defaut de la carte SD (peut etre un dossier parent pour recherche recursive)
SOURCE_PATH="/Volumes/FujiFilm/DCIM"

# Recherche recursive dans les sous-dossiers (true/false)
RECURSIVE=true

# --- Destination ---
# Dossier de destination
DEST_PATH="$HOME/Desktop/RAF_selectionnes"

# Organiser en sous-dossiers par date d'import (true/false)
# Ex: ~/Desktop/RAF_selectionnes/2026-02-09/DSCF0226_20260209.RAF
ORGANIZE_BY_DATE=false

# --- Extensions ---
# Extensions RAW a chercher (separees par des virgules, insensible a la casse)
RAW_EXTENSIONS="RAF"

# Copier aussi les JPG correspondants (true/false)
COPY_JPG=false

# --- Filtrage XMP (FastRawViewer / Photo Mechanic / etc.) ---
# Nombre d'etoiles minimum (0 = pas de filtre par etoiles)
MIN_STARS=0

# Label couleur (vide = pas de filtre par label)
# Valeurs courantes: Red, Yellow, Green, Blue, Purple
LABEL=""

# --- Securite ---
# Verifier l'integrite apres copie avec md5 (true/false)
# Plus lent mais garantit que le fichier n'est pas corrompu
VERIFY_COPY=true

# Enregistrer un historique des imports pour eviter les doublons (true/false)
TRACK_HISTORY=true
