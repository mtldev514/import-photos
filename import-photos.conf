# =============================================================================
# import-photos - Fichier de configuration
# =============================================================================
# Placez ce fichier dans ~/.import-photos.conf
# Toutes les valeurs peuvent etre surchargees par les options en ligne de commande.
#
# Nommage: {season}_{year}_{mon}_{dd}_{hh}_{mm}_{ss}.{ext}
# Ex: winter_2026_feb_10_08_54_37.raf

# --- Source ---
SOURCE_PATH="/Volumes/FujiFilm/DCIM"
RECURSIVE=true

# --- Destination ---
DEST_PATH="$HOME/Pictures/fuji-selects"

# --- Extensions ---
RAW_EXTENSIONS="RAF"
COPY_JPG=false

# --- Filtrage XMP (FastRawViewer / Photo Mechanic / etc.) ---
MIN_STARS=0
LABEL=""

# --- Post-import ---
CLEAN_SOURCE=false

# --- Securite ---
VERIFY_COPY=true
